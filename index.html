<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suscripción</title>

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <section class="form-card">
        <h2>📧 Suscripción Premium</h2>
        <p class="descripcion">Recibe contenido exclusivo y promociones</p>

        <form id="formSuscripcion">

            <div class="input-group">
                <label>Nombre</label>
                <div class="input-icon">
                    <i class="fa fa-user"></i>
                    <input type="text" id="nombre" placeholder="Tu nombre">
                </div>
            </div>

            <div class="input-group">
                <label>Correo electrónico *</label>
                <div class="input-icon">
                    <i class="fa fa-envelope"></i>
                    <input type="email" id="correo" required placeholder="ejemplo@gmail.com">
                </div>
            </div>

            <div class="input-group">
                <label>Plan</label>
                <select id="plan">
                    <option value="Gratis">Gratis</option>
                    <option value="Mensual">Mensual</option>
                    <option value="Anual">Anual</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terminos" required>
                <label>Acepto términos y condiciones *</label>
            </div>

            <button type="submit">
                <i class="fa fa-paper-plane"></i> Suscribirme
            </button>

        </form>
    </section>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>🎉 Suscripción exitosa</h3>
        <p id="resultado"></p>
        <button onclick="cerrarModal()">Cerrar</button>
    </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
